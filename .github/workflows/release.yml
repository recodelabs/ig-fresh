name: Release

# On a version tag (v1.2.3), build + test, then publish to npm.
# npm publish only runs when the NPM_TOKEN secret is set — until then the
# GitHub Action (recodelabs/ig-topcoat@v1) remains the primary distribution path
# and this workflow just validates the tagged commit.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Publish to npm
        if: ${{ env.NPM_TOKEN != '' }}
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
