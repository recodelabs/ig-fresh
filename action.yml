name: "ig-topcoat"
description: "Render an HL7 FHIR IG Publisher output directory into a modern, searchable static site."
author: "Recode Labs"
branding:
  icon: "layers"
  color: "blue"

inputs:
  input:
    description: "Path to a built IG Publisher output directory (the folder containing ImplementationGuide-*.json)."
    required: false
    default: "output"
  output:
    description: "Directory to write the rendered site into."
    required: false
    default: "_site"
  verbose:
    description: "Print per-artifact progress."
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        # No npm cache: setup-node's cache-dependency-path cannot glob outside
        # GITHUB_WORKSPACE, and a composite action's files live under _actions/ —
        # pointing it at github.action_path fails the whole step with
        # "Some specified paths were not resolved, unable to cache dependencies".

    - name: Build ig-topcoat
      shell: bash
      run: |
        cd "$GITHUB_ACTION_PATH"
        npm ci
        npm run build

    - name: Render site
      shell: bash
      run: |
        node "$GITHUB_ACTION_PATH/dist/cli.js" build \
          -i "${{ inputs.input }}" \
          -o "${{ inputs.output }}" \
          ${{ inputs.verbose == 'true' && '--verbose' || '' }}
